<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilwala Gallery</title>
	
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
	
	
        :root {
            --primary: #2d5a27;
            --primary-hover: #1e3d1a;
            --bg-color: #f0f7f0;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #eaf4ea 0%, #f0f7f0 100%);
            background-attachment: fixed;
            padding: 20px; 
            text-align: center; 
            color: var(--text-main);
            margin: 0;
        }

        h1 { color: var(--primary); margin-top: 10px; }

        /* Navigation & Controls */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 20px auto;
            flex-wrap: wrap;
            gap: 10px;
        }

        #filter { 
            padding: 12px; 
            border-radius: 12px; 
            border: 2px solid var(--primary); 
            background: white;
            font-weight: 600;
            outline: none;
        }

        .btn-home { 
            background: var(--primary); color: white; border: none; padding: 12px 20px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        
        .btn-download { 
            background: #444; color: white; border: none; padding: 12px 20px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .btn-home:hover, .btn-download:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Gallery Grid */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 20px auto; 
            padding: 10px;
        }

        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 18px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            cursor: pointer; 
            transition: all 0.3s ease; 
            border: 1px solid rgba(255,255,255,0.8);
        }

        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(45, 90, 39, 0.15); 
        }

        .card img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 12px; 
        }

        .card h3 { 
            font-size: 15px; 
            color: var(--primary); 
            margin-top: 15px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        /* Full Image Popup (Modal) */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px);
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            cursor: zoom-out;
        }

        .modal img { 
            max-width: 90%; 
            max-height: 85%; 
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 5px solid white;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #loadingMsg { font-weight: bold; color: var(--primary); margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header-nav">
        <button class="btn-home" onclick="window.location.href='index.html'">← Home</button>
        
        <select onchange="location.href='view.html?class=' + this.value" id="filter">
            <option value="">-- Switch Class --</option>
            <option value="2MT1">2MT1</option><option value="2MT2">2MT2</option><option value="2MT3">2MT3</option>
            <option value="2MTE">2MTE</option><option value="2SC1">2SC1</option><option value="2SC2">2SC2</option>
            <option value="2SCE">2SCE</option><option value="2PR1">2PR1</option><option value="2PE1">2PE1</option>
            <option value="2PE2">2PE2</option><option value="2PEE">2PEE</option>
        </select>

        <div id="galleryControls" style="display:none;">
            <button class="btn-download" onclick="downloadCurrentGallery()">Download PDF</button>
        </div>
    </div>

    <h1 id="title">Select a Class Gallery</h1>
    
    <div id="loadingMsg"></div>
    <div id="gallery" class="gallery"></div>

    <div id="modal" class="modal" onclick="this.style.display='none'">
        <img id="fullImg">
    </div>

<script>
    const dbURLs = {
        "2MT1": "https://script.google.com/macros/s/AKfycbyjasjbxmnwWdPcApWRkRX6i61ZTJI_yr6JcvLKybGmmzmsCxLqGZli6eZYU-Ua4cI/exec",
        "2MT2": "https://script.google.com/macros/s/AKfycbxtBaIv1yeKp1JH9u9xHp7OMzQ-XKKekyUlinLgAJLqTOshH5woC7Ge2ZO-ojD5dN6U/exec", 
        "2MT3": "https://script.google.com/macros/s/AKfycbxNboQq8joQSUhSQcpv_VbScC0y--nVWA1aicn9y8fFVB9RuZpaOOSCHGTY2auzbYGF/exec",
        "2MTE": "https://script.google.com/macros/s/AKfycbzv2H5cYKUiiTyVD23XRXGAV7-9_Vrz9nWVJf5Zz-8oV3C998kM5tWFYopvzUdDZS8A/exec", 
        "2SC1": "https://script.google.com/macros/s/AKfycbxnHntGJUWlfhCL7LZ9DFxIYpJOiy6Rnu2U6nSKr9s4xKyYUBn511UCpA6uFMTtJEU3/exec", 
        "2SC2": "https://script.google.com/macros/s/AKfycbz0vTDou24xKd5VYUtGP6iNFMY0vBiywrdiQp3SlDeexMIDzafDLyNbmnceP-O5UgbT/exec",
        "2SCE": "https://script.google.com/macros/s/AKfycbySxm-5wfcOwlO8MmTHsWgmNel79M8KeLCyomTi7uVTbn_-7n2_s0aOPUgxW4LmIw3E/exec", 
        "2PR1": "https://script.google.com/macros/s/AKfycbzJB8Yosp6UDcwFCOKyTPRO1-CLZFqun3Q1GWUUMLJumU4zGyzWGVYOqXL5vELkAw/exec", 
        "2PE1": "https://script.google.com/macros/s/AKfycbwZZy0LXrNvQWEnYZYeBDynap_lwctDJHNq9hbYQ16ivlRCBqL3mt3rRKQiiCSlZOxQCA/exec",
        "2PE2": "https://script.google.com/macros/s/AKfycbypDGKaioFw5mpzP6CxMqwVg9k6VWMQqVssJOW64bxyysrt3TXzKPdbPmkMMbrq6icR/exec", 
        "2PEE": "https://script.google.com/macros/s/AKfycbz_JkO2xlg9QFqQLoNVhvxe4IET2EYo2O3ZDLUktqS8tBN1-86Lgwmi77mHZ7bwJ8NX/exec"
    };

    const urlParams = new URLSearchParams(window.location.search);
    const cls = urlParams.get('class');
    const targetURL = dbURLs[cls];

    if (cls) {
        document.getElementById('title').innerText = "Nature Gallery: " + cls;
        document.getElementById('filter').value = cls;
        document.getElementById('galleryControls').style.display = 'block';
        load();
    }

    async function load() {
        const gallery = document.getElementById('gallery');
        const loadMsg = document.getElementById('loadingMsg');
        loadMsg.innerText = "🍃 Opening the diary for " + cls + "...";
        
        try {
            const res = await fetch(targetURL);
            const data = await res.json();
            
            loadMsg.innerText = ""; 

            if (data.length === 0) {
                loadMsg.innerText = "This class hasn't added any nature entries yet!";
                return;
            }

            data.forEach(row => {
                if (!row[2]) return; 

                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${row[2]}" loading="lazy">
                    <h3>${row[0]}</h3>
                `;
                // Popup Trigger
                div.onclick = () => {
                    document.getElementById('modal').style.display = 'flex';
                    document.getElementById('fullImg').src = row[2];
                };
                gallery.appendChild(div);
            });
        } catch (e) {
            loadMsg.innerText = "Error: Could not connect to the nature database.";
        }
    }

    async function downloadCurrentGallery() {
        const pass = prompt("Admin Password:");
        if (pass !== "1234") return alert("Access Denied");
        
        const loadMsg = document.getElementById('loadingMsg');
        loadMsg.innerText = "🌲 Preparing Class PDF... Please wait.";

        try {
            const response = await fetch(targetURL);
            const data = await response.json();
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();

            data.forEach((row, i) => {
                if (i > 0) pdf.addPage();
                pdf.setFontSize(20);
                pdf.setTextColor(45, 90, 39);
                pdf.text("Nilwala Nature Diary - " + cls, pageWidth / 2, 20, {align: "center"});
                pdf.line(20, 25, pageWidth - 20, 25);

                if (row[2]) pdf.addImage(row[2], 'JPEG', 35, 40, 140, 140);

                pdf.setFontSize(24);
                pdf.setTextColor(0);
                pdf.text(row[0].toUpperCase(), pageWidth / 2, 200, {align: "center"});
                pdf.setFontSize(14);
                pdf.text("Class: " + row[1], pageWidth / 2, 212, {align: "center"});
                pdf.text("Page " + (i + 1), pageWidth / 2, 285, {align: "center"});
            });

            pdf.save("Nature_Diary_" + cls + ".pdf");
            loadMsg.innerText = "";
            alert("PDF Ready!");
        } catch (err) {
            alert("PDF failed to generate.");
            loadMsg.innerText = "";
        }
    }
</script>
</body>
</html>
