<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nilwala Nature Diary - Gallery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f9f4; padding: 20px; color: #333; }
        h1 { text-align: center; color: #2d5a27; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 30px auto;
        }

        .student-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            cursor: pointer; /* Shows it is clickable */
            transition: transform 0.2s;
        }
        .student-card:hover { transform: translateY(-5px); background: #f9fdf9; }

        .student-photo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #2d5a27;
            margin-bottom: 10px;
        }

        .name { font-weight: bold; font-size: 1.1rem; color: #2d5a27; }
        .class-tag { font-size: 0.9rem; color: #666; background: #eef2f3; padding: 2px 10px; border-radius: 20px; }

        /* --- MODAL (POP-UP) STYLES --- */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85); /* Black background with opacity */
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-content {
            max-width: 90%;
            max-height: 70%;
            border: 5px solid white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .modal-caption {
            color: white;
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Nilwala Nature Diary: Student Gallery</h1>
    <div id="gallery" class="gallery"></div>

    <div id="myModal" class="modal" onclick="this.style.display='none'">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="imgFull">
        <div id="caption" class="modal-caption"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4XWWTWur8lP35tb_Ig8JFOy9J0gt4hXfaY3hkacqM53eVyPZNRSl5kl6jRF4cUmDRSw/exec";

        async function loadGallery() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                const gallery = document.getElementById('gallery');

                data.forEach(row => {
                    const card = document.createElement('div');
                    card.className = 'student-card';
                    
                    // row[0]=Name, row[1]=Class, row[2]=Photo
                    const photoSrc = row[2];

                    card.innerHTML = `
                        <img src="${photoSrc}" class="student-photo">
                        <div class="name">${row[0]}</div>
                        <span class="class-tag">${row[1]}</span>
                    `;

                    // Add click event to open the pop-up
                    card.onclick = function() {
                        openModal(photoSrc, row[0], row[1]);
                    };

                    gallery.appendChild(card);
                });
            } catch (err) {
                console.error("Failed to load gallery", err);
            }
        }

        function openModal(src, name, stuClass) {
            const modal = document.getElementById("myModal");
            const modalImg = document.getElementById("imgFull");
            const captionText = document.getElementById("caption");

            modal.style.display = "flex";
            modalImg.src = src;
            captionText.innerHTML = name + " - " + stuClass;
        }

        loadGallery();
    </script>
</body>
</html>
